
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw-vllm-openai.fullname" . }}
  labels:
    {{- include "openclaw-vllm-openai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "openclaw-vllm-openai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openclaw-vllm-openai.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "openclaw-vllm-openai.serviceAccountName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vllm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.vllm.port }}
              protocol: TCP
          env:
            # Make HF cache path deterministic (helps when persistence is enabled)
            - name: HF_HOME
              value: {{ .Values.persistence.mountPath | quote }}
            - name: TRANSFORMERS_CACHE
              value: {{ .Values.persistence.mountPath | quote }}
            {{- if .Values.huggingface.tokenSecretName }}
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.huggingface.tokenSecretName | quote }}
                  key: {{ .Values.huggingface.tokenSecretKey | quote }}
            {{- end }}
            {{- with .Values.env.extra }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          args:
            - "--model"
            - "{{ .Values.vllm.model }}"
            - "--port"
            - "{{ .Values.vllm.port }}"
            - "--dtype"
            - "{{ .Values.vllm.dtype }}"
            - "--max-model-len"
            - "{{ .Values.vllm.maxModelLen }}"
            - "--tensor-parallel-size"
            - "{{ .Values.vllm.tensorParallelSize }}"
            {{- with .Values.vllm.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          {{- end }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: model-cache
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-cache" (include "openclaw-vllm-openai.fullname" .)) .Values.persistence.existingClaim }}
        {{- end }}
